<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JAPP Financial</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

/* VIDEO BACKGROUND */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-2;
}

/* PARTICLES */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* CONTAINER */

.container{
width:92%;
max-width:420px;
margin:auto;
padding-top:40px;
padding-bottom:40px;
}

/* STATUS */

.status{
font-size:12px;
color:#00ff9c;
margin-bottom:10px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}
}

/* CLOCK */

.clock{
font-size:14px;
margin-bottom:20px;
opacity:.8;
}

/* LOGO */

.logo{
width:150px;
margin:auto;
display:block;
margin-bottom:20px;
cursor:pointer;

filter:
drop-shadow(0 0 20px #00e5ff)
drop-shadow(0 0 40px #4f7cff);

animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

/* AI TEXT */

.type{
font-size:18px;
margin-bottom:10px;
color:#00e5ff;
min-height:24px;
}

/* TITLE */

h1{
font-size:26px;
margin-bottom:8px;
}

/* TAGLINE */

.tagline{
font-size:14px;
margin-bottom:25px;
opacity:.9;
}

/* BUTTON GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* BUTTON */

.btn{
display:flex;
align-items:center;
justify-content:center;
padding:14px;
border-radius:12px;
text-decoration:none;
font-size:15px;
color:white;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.25);
backdrop-filter:blur(10px);

transition:0.3s;
position:relative;
overflow:hidden;
}

/* BUTTON GLOW */

.btn:before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent,
rgba(0,229,255,0.4),
transparent
);
transform:rotate(25deg);
transition:0.6s;
opacity:0;
}

.btn:hover:before{
opacity:1;
animation:shine 1s;
}

@keyframes shine{
from{transform:translateX(-100%) rotate(25deg);}
to{transform:translateX(100%) rotate(25deg);}
}

.btn:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.15);
}

/* SAVE BUTTON */

.save{
grid-column:span 2;
background:linear-gradient(135deg,#00e5ff,#4f7cff);
border:none;
}

/* SCAN LINE */

.scan{
position:fixed;
top:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(to right,transparent,#00e5ff,transparent);
animation:scan 6s linear infinite;
opacity:.4;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

</style>

</head>

<body>

<div class="scan"></div>

<canvas id="particles"></canvas>

<video class="bg-video" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<div class="status">● Available Online — Please Leave Your Text</div>

<div id="clock" class="clock"></div>

<img src="logo.png" class="logo" onclick="aiSpeak()">

<div id="type" class="type"></div>

<h1>KARGUR</h1>

<div class="tagline">
Future-Driven Financial Intelligence
</div>

<div class="grid">

<a class="btn" href="tel:+447877810779">📞 Call</a>

<a class="btn" href="mailto:jas@jappfinancial.co.uk">📧 Email</a>

<a class="btn" href="#">🌐 Website</a>

<a class="btn" href="https://wa.me/447877810779" target="_blank">💬 WhatsApp</a>

<a class="btn save" href="contact.vcf" download="JAPP_Financial.vcf">💾 Save Contact</a>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=now.toLocaleTimeString();
}

setInterval(updateClock,1000);


/* TYPING TEXT */

const lines=[
"KARGUR",
"Book flights in seconds.",
"Transfer money with confidence"
];

let i=0;
let j=0;
let deleting=false;

const el=document.getElementById("type");

function type(){

let text=lines[i];

if(!deleting){

el.textContent=text.slice(0,++j);

if(j===text.length){
deleting=true;
setTimeout(type,1200);
return;
}

}else{

el.textContent=text.slice(0,--j);

if(j===0){
deleting=false;
i=(i+1)%lines.length;
}

}

setTimeout(type,60);

}

type();


/* PARTICLES */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(0,229,255,0.7)";

for(let i=0;i<particles.length;i++){

let p=particles[i];

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
ctx.fill();

p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
}

}

requestAnimationFrame(draw);

}

draw();


/* AI VOICE */

function aiSpeak(){

if (speechSynthesis.speaking) {
speechSynthesis.cancel();
}

const msg=new SpeechSynthesisUtterance(
"With many years of industry experience, KARGUR offers dependable flight booking and efficient money transfer services to clients in HOUNSLOW and internationally."
);

msg.lang="en-GB";

const voices=speechSynthesis.getVoices();

let voice=
voices.find(v=>v.lang==="en-GB") ||
voices.find(v=>v.lang==="en-US") ||
voices[0];

msg.voice=voice;

msg.rate=1;
msg.pitch=1;

speechSynthesis.speak(msg);

}

/* FIX MOBILE VOICE LOAD */

speechSynthesis.onvoiceschanged=()=>{
speechSynthesis.getVoices();
};

/* AUTO SPEAK ON LOAD */

window.addEventListener("load",()=>{

setTimeout(()=>{
aiSpeak();
},1500);

});

</script>

</body>
</html>
